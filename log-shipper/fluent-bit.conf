[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ----------------------------------------------------------
# Inputs — tail the two structured JSON log files produced
# by log4j2. Fluent Bit follows log4j2's rotation natively.
# ----------------------------------------------------------

# SecurityEventLogger output — high-signal events
[INPUT]
    Name              tail
    Path              /var/log/vulntrade/security.log
    Path_Key          source_file
    Tag               vulntrade.security
    Parser            json
    Refresh_Interval  5
    Rotate_Wait       5
    DB                /var/log/fluent-bit/tail.db

# General application output
[INPUT]
    Name              tail
    Path              /var/log/vulntrade/app.log
    Path_Key          source_file
    Tag               vulntrade.app
    Parser            json
    Refresh_Interval  5
    Rotate_Wait       5
    DB                /var/log/fluent-bit/tail.db

# ----------------------------------------------------------
# Filters — minimal enrichment
# ----------------------------------------------------------
[FILTER]
    Name   modify
    Match  vulntrade.*
    Add    source vulntrade-backend

# ----------------------------------------------------------
# Output — S3. Credentials read from env (AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION).
#
# Upload cadence: whichever trips first —
#   - total_file_size 10M
#   - upload_timeout 1m
# At lab volume size never trips; the 1-minute timer drives
# every upload. This keeps Wazuh (5-min poll) fresh within
# 6 minutes end-to-end.
# ----------------------------------------------------------
[OUTPUT]
    Name              s3
    Match             vulntrade.*
    bucket            ${S3_BUCKET}
    region            ${AWS_REGION}
    total_file_size   10M
    upload_timeout    1m
    use_put_object    On
    compression       gzip
    json_date_key     timestamp
    s3_key_format     /vulntrade/$TAG/%Y/%m/%d/%H_%M_%S-$UUID.gz
    store_dir         /var/log/fluent-bit/s3-buffer
