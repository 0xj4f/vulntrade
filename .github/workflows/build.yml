name: Build & Publish

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  MAJOR: 0
  MINOR: 5

jobs:
  # --------------------------------------------------
  # PR validation — build both images, no push
  # --------------------------------------------------
  pr-build:
    name: PR Build (${{ matrix.component }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: vulntrade-${{ matrix.component }}:${{ github.sha }}

  # --------------------------------------------------
  # Main branch: version → publish → tag
  # --------------------------------------------------
  version:
    name: Calculate Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Calculate version
        id: version
        run: |
          MAJOR=${{ env.MAJOR }}
          MINOR=${{ env.MINOR }}
          PREFIX="${MAJOR}.${MINOR}"

          # Find the latest tag matching this MAJOR.MINOR
          LATEST=$(git tag -l "${PREFIX}.*" --sort=-v:refname | head -1)

          if [[ -n "$LATEST" ]]; then
            PATCH=$(echo "$LATEST" | awk -F. '{print $3}')
            PATCH=$((PATCH + 1))
          else
            PATCH=0
          fi

          VERSION="${PREFIX}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Calculated version: ${VERSION} (latest tag: ${LATEST:-none})"

  publish:
    name: Publish ${{ matrix.component }} to Docker Hub
    needs: [version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            0xj4f/vulntrade-${{ matrix.component }}:${{ needs.version.outputs.version }}
            0xj4f/vulntrade-${{ matrix.component }}:latest

  tag:
    name: Tag Release
    needs: [version, publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create tag
        run: |
          git config user.name "0xj4f"
          git config user.email "0xj4f.sh@gmail.com"
          git tag -a "${{ needs.version.outputs.version }}" -m "Release ${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"
